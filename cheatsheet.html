// 2. class and id--
<!--span.something with give us class
span#something with give us id
anything with .something will give us a div and class automatically without writing div.something
span#something.something will give us a span with id and class at the same time
anything with #something will give us a div and id automatically without writing div#something
-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <span class="purple"></span>
    <span id="red"></span>
    <div class="purple"></div>
    <div class="puple" id="red"></div>
    <span class="red" id="purple"></span>
    <div id="purple"></div>
</body>
</html>
