// 2. class and id--
<!--span.something with give us class
span#something with give us id
anything with .something will give us a div and class automatically without writing div.something
span#something.something will give us a span with id and class at the same time
anything with #something will give us a div and id automatically without writing div#something
-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <span class="purple"></span>
    <span id="red"></span>
    <div class="purple"></div>
    <div class="puple" id="red"></div>
    <span class="red" id="purple"></span>
    <div id="purple"></div>
</body>
</html>


// 3. attributes--
<!--you can create a attribute by using something then [] and inside the [] you can write the name of the attribute and its value like this [name=value]
you can combine it with class and id like this .something[name=value] or #something[name=value]
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button type=""></button>
    <div data-selected=""></div>
    <div submit="" class="purple" id="red"></div>
</body>
</html>


//4. children and sibling elements--
<!--you can create a child element by using > between the parent and the child like this parent > child
you can create a sibling element by using + between the siblings like this sibling1 + sibling2
you can also use ~ to select all the siblings after the first sibling like this sibling1 ~ sibling2
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="purple">
        <span id="purple">
            <nav></nav>
        </span>
    </div>
    <div class="purple"></div>
    <nav></nav>
</body>
</html>
